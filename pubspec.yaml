name: EcoShine24
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  simple_animations: ^5.0.0+3
  cupertino_icons: ^1.0.5
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.1.0
  url_launcher: ^6.1.10
  curved_navigation_bar: ^1.0.3
  carousel_slider: ^5.1.1
  cached_network_image: ^3.3.0
  bloc_provider: ^1.0.0
  scoped_model: ^2.0.0
  sqflite: ^2.2.8
  intl: ^0.20.2
  http: ^0.13.5
  fluttertoast: ^8.2.1
  image_picker: ^1.1.2
  path: ^1.8.2
  webview_flutter: ^4.2.0
  razorpay_flutter: ^1.4.0
  photo_view: ^0.15.0
  dots_indicator: ^3.0.0
  share_plus: 7.2.2
  flutter_rating_bar: ^4.0.1
  readmore: ^3.0.0
  crypto: ^3.0.2
  new_version: ^0.3.1
  in_app_review: ^2.0.10
  youtube_player_flutter: ^9.1.1
  google_maps_flutter: ^2.2.5
  firebase_messaging: ^15.2.9

  flutter_pagewise: ^2.0.4
  jiffy: ^6.4.3
  permission_handler: ^12.0.1
  country_code_picker: ^3.0.0
  pin_code_fields: ^8.0.1
  video_player: ^2.6.1
  firebase_core: ^3.15.1
  flutter_geofire: ^2.0.3
  firebase_database: ^11.3.9
  geolocator: ^14.0.2
  font_awesome_flutter: ^10.4.0
  flutter_polyline_points: ^1.0.0
  change_app_package_name: ^1.1.0
  get: ^4.6.5
  flutter_custom_clippers: ^2.1.0
  geocoding: ^4.0.0
  mobile_scanner: ^7.0.1
#  location: ^4.4.0
  cloud_firestore: ^5.6.11
  flutter_widget_from_html: ^0.17.0
  provider: ^6.1.1
  phonepe_payment_sdk: ^3.0.0
  location:

dependency_overrides:
  package_info_plus: ^8.0.0
  wakelock_windows: any
  win32: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/Home services 1.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/gifs/
    - assets/icon/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/font/Roboto-BoldItalic.ttf
        - asset: assets/font/Montserrat-Medium.ttf
          style: italic
          weight: 400
    - family: Roboto
      fonts:
        - asset: assets/font/Roboto-LightItalic.ttf
        - asset: assets/font/Roboto-Thin.ttf
          weight: 400
